<!DOCTYPE html>
<html lang="ja" data-theme="light" data-product="cms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Re:Earth Docs — prototype v3</title>
<style>
:root{
  --c-white:#fff;--c-gray-50:#f7f9fb;--c-gray-100:#eef2f6;--c-gray-200:#dde3ec;--c-gray-300:#c6cedb;--c-gray-400:#9aa6b8;--c-gray-500:#6b7888;--c-gray-600:#4d5b6b;--c-gray-700:#36424f;--c-gray-900:#131b24;
  --c-brand:#1664e0;
  --c-visualizer:#1f5ee0;--c-visualizer-soft:#e7efff;--c-cms:#6d4be0;--c-cms-soft:#efeafe;--c-flow:#0e766b;--c-flow-soft:#ddf3f0;--c-dashboard:#4d5b6b;
  --t-tutorial:#0f7a48;--t-tutorial-soft:#e1f4ea;--t-howto:#1664e0;--t-howto-soft:#e8f0fe;--t-reference:#6d4be0;--t-reference-soft:#efeafe;--t-concepts:#96590a;--t-concepts-soft:#fbefda;
  --font-sans:system-ui,-apple-system,"Segoe UI","Noto Sans JP",Meiryo,sans-serif;--font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --topbar-h:60px;--subbar-h:48px;--sidebar-w:290px;--toc-w:230px;--content-max:760px;--page-max:1460px;
}
:root[data-theme="light"]{--bg:#fff;--bg-subtle:#f7f9fb;--surface:#fff;--border:#dde3ec;--border-strong:#c6cedb;--text:#131b24;--text-soft:#4d5b6b;--text-muted:#5c6773;--code-bg:#f2f5f9;--shadow:0 4px 14px rgba(15,27,36,.08);--accent:var(--c-cms);--accent-soft:var(--c-cms-soft);}
:root[data-theme="dark"]{--bg:#17191e;--bg-subtle:#1c1f26;--surface:#1c1f26;--border:#2c303a;--border-strong:#3a3f4b;--text:#f6f7f9;--text-soft:#c6ccd5;--text-muted:#8a929f;--code-bg:#131b24;--shadow:0 8px 24px rgba(0,0,0,.4);--accent:#a98bff;--accent-soft:#2b2347;}
:root[data-product="cms"]{--accent:var(--c-cms);--accent-soft:var(--c-cms-soft);}
:root[data-product="visualizer"]{--accent:var(--c-visualizer);--accent-soft:var(--c-visualizer-soft);}
:root[data-product="flow"]{--accent:var(--c-flow);--accent-soft:var(--c-flow-soft);}
:root[data-theme="dark"][data-product="cms"]{--accent:#a98bff;--accent-soft:#2b2347;}
:root[data-theme="dark"][data-product="visualizer"]{--accent:#6f9bff;--accent-soft:#1f2b44;}
:root[data-theme="dark"][data-product="flow"]{--accent:#34c9bb;--accent-soft:#163a37;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-sans);font-size:15px;line-height:1.65;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
h1,h2,h3{line-height:1.25;letter-spacing:-.018em;font-weight:600;}
button{font-family:inherit;cursor:pointer;}
code{font-family:var(--font-mono);font-size:.85em;background:var(--code-bg);padding:2px 6px;border-radius:5px;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.skip{position:absolute;left:-999px;top:8px;background:var(--accent);color:#fff;padding:8px 14px;border-radius:8px;z-index:100;}.skip:focus{left:8px;}
.topbar{position:sticky;top:0;z-index:30;height:var(--topbar-h);display:flex;align-items:center;gap:16px;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:-.02em;font-size:16px;color:var(--text);background:none;border:none;padding:0;}
.logo .dot{width:22px;height:22px;border-radius:7px;background:var(--c-brand);}
.switcher{display:flex;gap:2px;margin-left:4px;flex-wrap:wrap;}
.switcher button{padding:7px 11px;border:none;border-radius:8px;font-size:13.5px;font-weight:500;background:transparent;color:var(--text-soft);white-space:nowrap;}
.switcher button[aria-current="true"]{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.topbar .spacer{flex:1;}
.searchbtn{display:flex;align-items:center;gap:8px;padding:7px 12px;min-width:180px;border:1px solid var(--border);border-radius:9px;background:var(--bg-subtle);color:var(--text-muted);font-size:13px;}
.openprod{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;text-decoration:none;}
.openprod:hover{background:var(--bg-subtle);}
.openprod svg{width:14px;height:14px;flex:none;}
.searchbtn kbd{margin-left:auto;font-family:var(--font-mono);font-size:11px;border:1px solid var(--border);border-radius:5px;padding:1px 5px;background:var(--surface);}
.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.seg button{padding:5px 10px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;}
.seg button[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent);}
.iconbtn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--bg-subtle);color:var(--text-soft);display:flex;align-items:center;justify-content:center;font-size:15px;}
.subbar{position:sticky;top:var(--topbar-h);z-index:20;height:var(--subbar-h);display:flex;align-items:center;gap:4px;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.subbar .ctx{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;text-decoration:none;padding:6px 4px;border-radius:6px;}
.subbar .ctx:hover{color:var(--accent);}
.subbar .ctx-sep{color:var(--text-muted);margin-right:6px;font-size:12px;}
.subbar button{padding:7px 12px;border:none;border-radius:8px;font-size:13.5px;font-weight:500;background:transparent;color:var(--text-soft);white-space:nowrap;}
.subbar button[aria-current="true"]{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;max-width:var(--page-max);}
.sidebar{border-right:1px solid var(--border);padding:22px 14px;height:calc(100vh - var(--topbar-h) - var(--subbar-h));position:sticky;top:calc(var(--topbar-h) + var(--subbar-h));overflow-y:auto;}
.sidebar .grp{margin-bottom:15px;}
.sidebar .grp-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:5px 10px;width:100%;background:none;border:none;text-align:left;cursor:pointer;border-radius:6px;}
.sidebar .grp-h:hover{background:var(--bg-subtle);color:var(--text-soft);}
.sidebar .grp-h .chev{font-size:9px;width:9px;flex:none;}
.sidebar .sb-tab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:2px 10px 8px;}
.sidebar .grp-h .swatch{width:8px;height:8px;border-radius:3px;}
.sidebar a{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;font-size:13.5px;color:var(--text-soft);border-left:2px solid transparent;margin-bottom:1px;}
.sidebar a[aria-current="true"]{background:var(--accent-soft);color:var(--accent);font-weight:600;border-left-color:var(--accent);}
.sidebar a .soon{margin-left:auto;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:0 4px;}
.main{min-width:0;}
.content-wrap{display:grid;grid-template-columns:minmax(0,1fr) var(--toc-w);gap:40px;padding:34px 40px 80px;max-width:1200px;}
.content-wrap.no-toc{grid-template-columns:minmax(0,1fr);max-width:900px;}
article{min-width:0;max-width:var(--content-max);}
article a{color:var(--accent);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px;}
.toc{position:sticky;top:calc(var(--topbar-h) + var(--subbar-h) + 20px);height:max-content;font-size:12.5px;}
.toc .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px;}
.toc a{display:block;padding:4px 0 4px 12px;color:var(--text-muted);border-left:1px solid var(--border);text-decoration:none;}
.crumbs{display:flex;gap:7px;font-size:12.5px;color:var(--text-muted);margin-bottom:14px;flex-wrap:wrap;}
.crumbs a{color:var(--text-muted);}.crumbs .sep{opacity:.5;}
.pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;}
.tags{margin:10px 0 2px;}
.tag{font-size:11.5px;font-weight:600;color:var(--text-soft);background:var(--bg-subtle);border:1px solid var(--border);border-radius:6px;padding:2px 8px;}
h1.title{font-size:31px;margin:14px 0 8px;}
.lead{font-size:17px;color:var(--text-soft);margin:0 0 22px;}
article h2{font-size:21px;margin:32px 0 12px;scroll-margin:100px;}
.hanchor{opacity:0;margin-left:8px;color:var(--text-muted);text-decoration:none;font-weight:400;transition:opacity .12s;}
article h2:hover .hanchor,article h3:hover .hanchor,.hanchor:focus{opacity:1;}
.hanchor:hover{color:var(--accent);}
@media(hover:none){.hanchor{opacity:.5;}}
article p{margin:0 0 14px;color:var(--text-soft);}article b{color:var(--text);}
article ul{color:var(--text-soft);margin:0 0 14px;padding-left:22px;}article li{margin:3px 0;}
.note{display:flex;gap:11px;padding:13px 16px;border:1px solid var(--accent);border-radius:12px;background:var(--accent-soft);margin:0 0 24px;font-size:13.5px;color:var(--text-soft);}
.stale{display:flex;gap:11px;padding:12px 16px;border:1px solid var(--c-flow);background:var(--c-flow-soft);border-radius:12px;margin:0 0 22px;font-size:13px;color:#0b3d38;}
:root[data-theme="dark"] .stale{color:#bfeee7;background:#12332f;}
.stub{padding:20px 22px;border:1px dashed var(--border-strong);border-radius:12px;color:var(--text-muted);font-size:14px;background:var(--bg-subtle);}
.codeblock{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--code-bg);font-family:var(--font-mono);font-size:12.5px;color:var(--text-soft);overflow-x:auto;margin:0 0 16px;line-height:1.7;}
.codeblock .k{color:#a855f7;}.codeblock .cm{color:var(--text-muted);}
.refitem{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:var(--surface);scroll-margin:100px;}
.refitem .hd{display:flex;align-items:center;gap:11px;margin-bottom:7px;}
.refitem .num{width:26px;height:26px;flex:none;border-radius:7px;background:var(--t-reference-soft);color:var(--t-reference);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:600;}
.refitem h3{font-size:15px;margin:0;flex:1;}
.pager{display:flex;gap:12px;margin:30px 0 0;}
.pagecard{flex:1;min-width:0;display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:12px;padding:13px 16px;background:var(--surface);color:inherit;text-decoration:none;}
.pagecard:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.pagecard .body{min-width:0;}
.pagecard .lab{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
.pagecard .tt{display:block;font-weight:600;color:var(--text);font-size:14.5px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pagecard .arr{flex:none;color:var(--text-muted);font-size:18px;}
.pagecard:hover .arr{color:var(--accent);}
.pagecard.prev{justify-content:flex-start;}
.pagecard.next{justify-content:flex-end;text-align:right;}
.seealso{margin-top:26px;padding-top:16px;border-top:1px solid var(--border);}
.seealso .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:11px;}
.seealso .sa-group{margin-bottom:12px;}
.seealso .sa-type{font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:6px;}
.seealso a{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text-soft);border:1px solid var(--border);border-radius:8px;padding:5px 11px;margin:0 6px 6px 0;text-decoration:none;}
.seealso a:hover{border-color:var(--accent);color:var(--accent);}
.seealso .dot{width:7px;height:7px;border-radius:2px;flex:none;}
.seealso .sa-item{margin:0 0 8px;line-height:1.5;}
.seealso .sa-item:last-child{margin-bottom:0;}
.seealso .sa-item a{display:inline;border:none;border-radius:0;padding:0;margin:0;font-size:14px;font-weight:500;color:var(--accent);}
.seealso .sa-item a:hover{border:none;color:var(--accent);text-decoration:underline;}
.seealso .sa-note{display:inline;font-size:12.5px;color:var(--text-muted);}
.hovercard{position:fixed;z-index:60;max-width:300px;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:var(--shadow);padding:11px 13px;pointer-events:none;}
.hovercard .hc-top{margin-bottom:6px;}
.hovercard .hc-tab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
.hovercard .hc-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;}
.hovercard .hc-lead{font-size:12.5px;color:var(--text-soft);margin-top:5px;line-height:1.5;}
.docmeta{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:16px 24px;align-items:center;font-size:12.5px;color:var(--text-muted);}
.upd{display:flex;gap:16px;padding:13px 0;border-bottom:1px solid var(--border);}
.upd-date{flex:none;width:120px;font-size:12.5px;color:var(--text-muted);}
.upd-body a{font-weight:600;font-size:14px;text-decoration:none;color:var(--accent);}
.upd-body a:hover{text-decoration:underline;}
.upd-sum{font-size:13px;color:var(--text-soft);margin-top:3px;}
.fb{margin-top:22px;padding:16px 0 0;}
.fb .q{font-size:13.5px;font-weight:600;margin-bottom:9px;color:var(--text);}
.fb .btns{display:flex;gap:8px;}
.fb button{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-subtle);color:var(--text-soft);font-size:13px;font-weight:600;}
.fb button[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.fb .thanks{margin-top:8px;font-size:12.5px;color:var(--text-muted);}
.home{max-width:960px;margin:0 auto;padding:46px 30px 90px;}
.hero{text-align:center;margin-bottom:40px;}
.hero h1{font-size:34px;margin:0 0 10px;}.hero p{font-size:16px;color:var(--text-soft);max-width:640px;margin:0 auto;}
.sect{margin-bottom:34px;}
.sect-h{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:0 0 4px;}
.sect-s{font-size:13px;color:var(--text-muted);margin:0 0 14px;}
.prodgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.prodcard{border:1px solid var(--border);border-radius:14px;padding:18px;background:var(--surface);display:block;color:inherit;}
a.prodcard:hover{border-color:var(--accent);box-shadow:var(--shadow);text-decoration:none;}
.prodcard .nm{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;margin-bottom:6px;}
.prodcard .nm .sw{width:11px;height:11px;border-radius:4px;}
.prodcard .pd{font-size:12.5px;color:var(--text-muted);margin-bottom:10px;min-height:40px;}
.prodcard .go{font-size:12.5px;font-weight:600;color:var(--accent);}
.prodcard.soon{opacity:.72;}
.soonbadge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border:1px solid var(--border);border-radius:5px;padding:1px 6px;margin-left:auto;}
.structure{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.structure span{font-size:10.5px;color:var(--text-muted);background:var(--bg-subtle);border:1px solid var(--border);border-radius:5px;padding:1px 7px;}
.tutbanner{border:1px solid var(--accent);background:var(--accent-soft);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px;}
.tutbanner .cta{padding:9px 16px;border-radius:9px;background:var(--accent);color:#fff;font-weight:600;font-size:13.5px;border:none;}
.commgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.commcard{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:12px;padding:15px 16px;background:var(--surface);color:inherit;text-decoration:none;}
.commcard:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.commcard .ci{flex:none;width:34px;height:34px;border-radius:9px;background:var(--bg-subtle);color:var(--text-soft);display:flex;align-items:center;justify-content:center;}
.commcard:hover .ci{color:var(--accent);}
.commcard .cbody{min-width:0;flex:1;}
.commcard .cn{display:block;font-weight:600;font-size:14px;color:var(--text);}
.commcard .cr{display:block;font-size:12px;color:var(--text-muted);margin-top:1px;}
.commcard .carr{flex:none;color:var(--text-muted);font-size:14px;}
.searchfacets{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;}
.searchfacets .fl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-right:2px;}
.searchfacets .schip{padding:3px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-soft);font-size:11.5px;font-weight:600;}
.searchfacets .schip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.searchfacets .sep{width:1px;height:16px;background:var(--border);margin:0 4px;}
.lib{max-width:1000px;margin:0 auto;padding:40px 30px 90px;}
.lib h1{font-size:28px;margin:0 0 6px;}.lib .sub{color:var(--text-soft);margin:0 0 22px;}
.filters{display:flex;flex-wrap:wrap;gap:20px;padding:16px 18px;border:1px solid var(--border);border-radius:12px;background:var(--bg-subtle);margin-bottom:22px;}
.fgroup .fh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-soft);font-size:12px;font-weight:600;}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.tutlist{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.tutcard{border:1px solid var(--border);border-radius:12px;padding:16px 18px;background:var(--surface);display:block;color:inherit;}
.tutcard:hover{border-color:var(--accent);box-shadow:var(--shadow);text-decoration:none;}
.tutcard .meta{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.tutcard .ct{font-weight:600;font-size:15px;margin-bottom:4px;color:var(--text);}
.tutcard .cd{font-size:12.5px;color:var(--text-muted);}
.badge{font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 8px;}
.empty{padding:40px;text-align:center;color:var(--text-muted);}
.modal{position:fixed;inset:0;background:rgba(10,15,22,.45);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;}
.modal[hidden]{display:none;}
.searchbox{width:min(560px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
.searchbox input{width:100%;border:none;padding:16px 18px;font-size:15px;background:transparent;color:var(--text);border-bottom:1px solid var(--border);}
.searchbox input:focus{outline:none;}
.results{max-height:52vh;overflow-y:auto;padding:8px;}
.result{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;color:inherit;}
.result:hover,.result.act{background:var(--bg-subtle);text-decoration:none;}
.result .rt{font-weight:600;font-size:13.5px;color:var(--text);}.result .rc{font-size:11.5px;color:var(--text-muted);}
.searchfoot{padding:10px 16px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text-muted);display:flex;justify-content:space-between;}
.placeholder{max-width:640px;margin:60px auto;text-align:center;padding:0 24px;}
.placeholder h1{font-size:24px;margin-bottom:10px;}.placeholder p{color:var(--text-soft);}
.site-footer{border-top:1px solid var(--border);background:var(--bg-subtle);margin-top:20px;}
.ft-inner{max-width:var(--page-max);margin:0 auto;padding:18px 24px;display:flex;flex-direction:column;gap:14px;}
.ft-apps{display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.ft-apps-h{font-size:12.5px;font-weight:600;color:var(--text-soft);}
.ft-apps-links{display:flex;flex-wrap:wrap;gap:8px 18px;}

PAGES["cms/overview"]={section:"cms",tab:"overview",title:{en:"Re:Earth CMS",ja:"Re:Earth CMS"},lead:{en:"A headless, geospatial-first CMS. The same structured content feeds a map, a table and an integration at once.",ja:"地理空間を第一に考えたヘッドレスCMS。同じ構造化コンテンツが、地図・テーブル・外部連携に同時に使えます。"},updated:{en:"July 8, 2026",ja:"2026年7月8日"},
  body:function(){return "<p>"+L({en:"Model your data once, then serve it everywhere.",ja:"データを一度モデル化すれば、どこにでも配信できます。"})+"</p>"+overviewHub("cms");}};
PAGES["cms/c-schema"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"Decide your model structure first",ja:"モデルの構造を先に決める"},lead:{en:"Deciding the shape of your data before you enter anything sets the quality of everything that follows — input, search and delivery.",ja:"何かを入れ始める前にデータの形を決めることが、その後の入力・検索・配信の質を決めます。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"A <b>model</b> is the shape your data takes — which fields it has and how each is typed. Decide it up front: the structure you choose determines how well you can input, search and deliver that data later.",ja:"<b>モデル</b>はデータの形（どんなフィールドを持ち、どう型付けするか）です。先に決めます。選んだ構造が、後の入力・検索・配信のしやすさを左右します。"})+"</p>";},next:"cms/c-relations",refs:["cms/r-models","cms/r-fields"]};
PAGES["cms/c-relations"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"Connect one model to another",ja:"モデルとモデルをつなぐ"},lead:{en:"Treating separate data units as references that point to each other lets you split models instead of cramming everything into one.",ja:"複数のデータ単位を互いに指し示す参照として扱うと、すべてを1つに詰め込まずモデルを分けて設計できます。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"Rather than one huge model, keep separate units — say City and Facility — in their own models and link them by <b>reference</b>. Each model stays focused and reusable.",ja:"1つの巨大なモデルにせず、別々の単位（例：都市と施設）を各モデルに保ち、<b>参照</b>でつなぎます。各モデルが焦点を保ち再利用しやすくなります。"})+"</p>";},next:"cms/c-validation",refs:["cms/r-models"]};
PAGES["cms/c-validation"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"Decide input rules first",ja:"入力ルールを先に決める"},lead:{en:"Rules that reject invalid data at input time decide the quality of your day-to-day operation.",ja:"不正なデータを入力時点ではじく仕組みが、日々の運用の質を決めます。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"Deciding validation up front — required fields, allowed values, formats — stops bad data from entering in the first place, rather than cleaning it up later.",ja:"必須・許容値・形式などのバリデーションを先に決めると、後から直すのではなく、そもそも悪いデータが入らないようにできます。"})+"</p>";},next:"cms/c-metadata",refs:["cms/r-attributes"]};
PAGES["cms/c-metadata"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"Separate content from management data",ja:"本体と管理情報を分ける"},lead:{en:"Keeping management data apart from the content body's own schema keeps responsibilities clear.",ja:"管理用データを本体スキーマとは別に持つことで、責務を切り分けます。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"Who edited it, when, and its status are <b>management data</b> — keep them separate from the content body's fields so each has one clear responsibility.",ja:"誰がいつ編集したか、状態はどうか、は<b>管理情報</b>です。本体のフィールドと分けて持ち、それぞれの責務を1つに保ちます。"})+"</p>";},next:"cms/c-asset-field",refs:[]};
PAGES["cms/c-asset-field"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"Assets vs. fields",ja:"アセットとフィールドの違い"},lead:{en:"A structured field and a file-based asset are handled differently — knowing which is which tells you where a piece of data belongs.",ja:"構造化データのフィールドと、ファイルとしてのアセットは扱い方が違います。この違いが、データをどちらで持つかの判断になります。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"Text, numbers and dates live in <b>fields</b>; images, GeoJSON and PDFs live as <b>assets</b> and are referenced from a field. Match the data to the right one.",ja:"テキスト・数値・日付は<b>フィールド</b>に、画像・GeoJSON・PDF は<b>アセット</b>として持ち、フィールドから参照します。データに合った方を選びます。"})+"</p>";},next:"cms/c-delivery",refs:["cms/r-fields"]};
PAGES["cms/c-delivery"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"How delivery works",ja:"配信のしくみ"},lead:{en:"There are two ways data made in the CMS becomes usable outside: the CMS's own publish/delivery, and retrieval through an API.",ja:"CMS 内で作ったデータを外部から使える形にする仕組みには、CMS 機能としての公開・配信と、API 経由の取得の2種類があります。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  toc:[{id:"d-two",l:{en:"Two paths out",ja:"2つの出口"}}],
  body:function(){return "<h2 id=\"d-two\">"+L({en:"Two paths out",ja:"外に出る2つの道"})+"</h2><p>"+L({en:"Content leaves the CMS in two ways: the CMS's own publish/delivery, and retrieval through an API. They serve different consumers, so it helps to know which you are using.",ja:"コンテンツが CMS から出る道は2つあります。CMS 自身の公開・配信と、API 経由の取得です。届け先が異なるため、どちらを使っているかを意識します。"})+"</p>";},next:"cms/c-publish-deliver",refs:["cms/howto-manage"]};
PAGES["cms/c-publish-deliver"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"\"Publish\" vs. \"deliver\"",ja:"「公開」と「配信」の違い"},lead:{en:"Setting an item to published in the CMS auto-delivers it; fetching it through the API is a separate mechanism.",ja:"CMS の設定で公開状態にすると自動で配信される仕組みと、API 経由で取得する仕組みは別のものです。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"\"Publish\" is a state you set in the CMS UI; \"deliver\" is how a consumer gets the data. Publishing can trigger delivery, but an API fetch is a different path — keeping them distinct avoids confusion.",ja:"「公開」は CMS の UI で設定する状態、「配信」は受け手がデータを得る経路です。公開が配信を引き起こすこともありますが、API 取得は別の道です。区別すると混乱を防げます。"})+"</p>";},next:"cms/c-operation",refs:["cms/c-delivery"]};
PAGES["cms/c-operation"]={section:"cms",tab:"concepts",type:"concepts",title:{en:"How day-to-day operation works",ja:"運用のしくみ"},lead:{en:"Operation is running your data as an ongoing part of daily work — the continuous cycle of use that follows the one-time act of designing it.",ja:"運用は、作ったデータを日々の業務として動かし続ける営みです。1回の設計（作る）に対して、継続的な使用のサイクルが続きます。"},updated:{en:"July 10, 2026",ja:"2026年7月10日"},
  body:function(){return "<p>"+L({en:"Designing the data is a one-time act; operating it is continuous — state changes, review and approval, versioning and comments. This article gives the overview; the details live in How-to and Reference.",ja:"データの設計は1回きり、運用は継続的です（状態遷移・変更承認・バージョン管理・コメント等）。この記事は概要で、詳細は How-to と Reference にあります。"})+"</p>";},refs:["cms/howto-manage"]};
PAGES["cms/howto-manage"]={section:"cms",tab:"how-to",type:"howto",title:{en:"Manage content items",ja:"コンテンツアイテムを管理する"},lead:{en:"Goal-oriented steps to create, edit and bulk-update items. Assumes a model with fields exists.",ja:"アイテムの作成・編集・一括更新の手順。フィールドを持つモデルがある前提です。"},updated:{en:"July 2, 2026",ja:"2026年7月2日"},
  toc:[{id:"h-create",l:{en:"Create",ja:"作成"}},{id:"h-edit",l:{en:"Edit & version",ja:"編集とバージョン"}},{id:"h-bulk",l:{en:"Bulk actions",ja:"一括操作"}}],
  body:function(){return "<h2 id=\"h-create\">"+L({en:"Create an item",ja:"アイテムを作成する"})+"</h2><p>"+L({en:"Open <b>Content</b>, select your model, click <b>+ New item</b>, fill fields, then Save draft or Publish.",ja:"<b>コンテンツ</b>を開きモデルを選択、<b>＋新規アイテム</b>で入力し、下書き保存または公開します。"})+"</p><h2 id=\"h-edit\">"+L({en:"Edit & version",ja:"編集とバージョン管理"})+"</h2><p>"+L({en:"Editing creates a new draft version; earlier versions stay in history.",ja:"編集で新しい下書き版が作られ、以前の版は履歴に残ります。"})+"</p><h2 id=\"h-bulk\">"+L({en:"Bulk actions",ja:"一括操作"})+"</h2><p>"+L({en:"Select rows and publish, tag or delete many at once.",ja:"行を選択して公開・タグ付け・削除を一括適用します。"})+"</p>";},next:"cms/c-operation",refs:["cms/r-fields","cms/c-schema"]};
PAGES["cms/r-fields"]={section:"cms",tab:"reference",type:"reference",title:{en:"Field types",ja:"フィールド型"},lead:{en:"The kinds of input fields you can add to a model. Each entry is self-contained — copy its anchor to cite it directly.",ja:"モデルに設けられる入力欄の種類。各項目は自己完結し、アンカーで直接引用できます。"},updated:{en:"June 28, 2026",ja:"2026年6月28日"},stale:true,isRefCms:true,refs:[{route:"cms/c-relations",note:{en:"How the Reference field type links one model to another.",ja:"「参照」型で他のモデルとつなぐときの考え方"}},"cms/c-validation",{route:"cms/r-models",note:{en:"The container that groups typed fields.",ja:"型を持つフィールドをまとめる入れ物"}}]};

PAGES["cms/tutorial-getstarted"]={section:"cms",type:"tutorial",standalone:true,title:{en:"Get started with CMS",ja:"CMSをはじめる"},lead:{en:"Create your first model, add a field and publish an item — about 12 minutes. No prior CMS experience needed.",ja:"最初のモデルを作り、フィールドを追加し、アイテムを公開するまで約12分。CMSの経験は不要です。"},est:{en:"12 min",ja:"12分"},prereq:"cms/c-schema",updated:{en:"July 8, 2026",ja:"2026年7月8日"},

  body:function(){return "<div class=\"note\"><span>ℹ️</span><div><b>"+L({en:"Before you start:",ja:"はじめる前に："})+"</b> "+L({en:"new to the model? Read",ja:"モデルが初めてなら"})+" <a href=\"#\" data-route=\"cms/c-schema\">"+L({en:"Decide your model structure first",ja:"モデルの構造を先に決める"})+"</a> "+L({en:"— it explains the why.",ja:"を読むと「なぜ」が分かります。"})+"</div></div><h2 id=\"s1\">"+L({en:"Step 1 · Create a model",ja:"ステップ1 · モデルを作成"})+"</h2><p>"+L({en:"A <b>model</b> is a blueprint — a \"Landmark\", a \"Bus stop\", a \"Flood zone\". Open <b>Schema</b> and click <b>+ New model</b>.",ja:"<b>モデル</b>は設計図です（「ランドマーク」「バス停」「浸水区域」）。<b>スキーマ</b>で<b>＋新規モデル</b>。"})+"</p><h2 id=\"s2\">"+L({en:"Step 2 · Add fields",ja:"ステップ2 · フィールドを追加"})+"</h2><p>"+L({en:"Add a <code>Text</code> field and a <code>Geometry (Editor)</code> field. The",ja:"<code>Text</code>型と<code>Geometry (Editor)</code>型を追加。"})+" <a href=\"#\" data-route=\"cms/r-fields\">"+L({en:"field types reference",ja:"フィールド型のリファレンス"})+"</a> "+L({en:"lists them all.",ja:"に全種類が載っています。"})+"</p><h2 id=\"s3\">"+L({en:"Step 3 · Publish an item",ja:"ステップ3 · アイテムを公開"})+"</h2><p>"+L({en:"Add an item and hit <b>Publish</b>. It is now served by the API:",ja:"アイテムを追加して<b>公開</b>。APIから配信されます："})+"</p><div class=\"codeblock\"><div><span class=\"k\">GET</span> https://api.reearth.io/cms/v1/projects/{id}/models/landmark/items</div></div>";},refs:["cms/c-schema","cms/r-fields"]};

PAGES["visualizer/concepts-layers"]={section:"visualizer",tab:"concepts",type:"concepts",title:{en:"Layers & scenes",ja:"レイヤーとシーン"},lead:{en:"How a Visualizer map is composed from data layers and a saved scene.",ja:"Visualizerの地図がデータレイヤーと保存シーンからどう構成されるか。"},updated:{en:"July 1, 2026",ja:"2026年7月1日"},
  body:function(){return "<p>"+L({en:"A <b>layer</b> binds one data source to a visual style; a <b>scene</b> is the saved arrangement you publish. Separating data from style lets the same flood-zone data render as a bold overlay in one scene and a subtle outline in another.",ja:"<b>レイヤー</b>はデータソースを見た目に結び付け、<b>シーン</b>は公開する保存済み構成です。データと見た目を分けるから、同じ浸水区域データが、あるシーンでは濃い塗り、別のシーンでは控えめな輪郭になります。"})+"</p>";},next:"visualizer/tutorial-firstmap",refs:["cms/c-schema"]};
PAGES["visualizer/tutorial-firstmap"]={section:"visualizer",type:"tutorial",standalone:true,title:{en:"Publish your first map",ja:"最初の地図を公開する"},lead:{en:"Load a dataset, style a layer and publish a shareable scene — about 10 minutes.",ja:"データを読み込み、レイヤーをスタイリングして共有シーンを公開。約10分。"},est:{en:"10 min",ja:"10分"},prereq:"visualizer/concepts-layers",updated:{en:"July 5, 2026",ja:"2026年7月5日"},
  body:function(){return "<div class=\"note\"><span>ℹ️</span><div><b>"+L({en:"Before you start:",ja:"はじめる前に："})+"</b> "+L({en:"skim",ja:"まず"})+" <a href=\"#\" data-route=\"visualizer/concepts-layers\">"+L({en:"Layers & scenes",ja:"レイヤーとシーン"})+"</a>"+L({en:".",ja:"に目を通してください。"})+"</div></div><p>"+L({en:"Import a GeoJSON of evacuation sites, style them by capacity, and publish. Your scene now has a shareable URL.",ja:"避難所の GeoJSON を読み込み、収容人数でスタイリングして公開。共有用URLが付きます。"})+"</p>";},refs:["visualizer/concepts-layers"]};

PAGES["vplugin/overview"]={section:"vplugin",tab:"overview",title:{en:"Visualizer Plugin",ja:"Visualizer プラグイン"},lead:{en:"Extend Re:Earth Visualizer with plugins that add UI and behaviour.",ja:"UI や振る舞いを足すプラグインで Re:Earth Visualizer を拡張します。"},updated:{en:"July 3, 2026",ja:"2026年7月3日"},
  toc:[{id:"o-what",l:{en:"What is a plugin",ja:"プラグインとは"}},{id:"o-system",l:{en:"Plugin system",ja:"仕組み"}},{id:"o-types",l:{en:"Extension types",ja:"拡張タイプ"}}],
  body:function(){return "<h2 id=\"o-what\">"+L({en:"What is a plugin?",ja:"プラグインとは"})+"</h2><p>"+L({en:"A plugin adds custom UI and behaviour to Visualizer — a widget in the corner, a block inside an infobox, or a step in a story.",ja:"プラグインは Visualizer にカスタム UI と振る舞いを足します（隅のウィジェット、インフォボックス内のブロック、ストーリーの1ステップ等）。"})+"</p><h2 id=\"o-system\">"+L({en:"Plugin system (WASM + iframe)",ja:"Plugin System（WASM + iframe）"})+"</h2><p>"+L({en:"Plugin code runs sandboxed in an iframe and talks to Visualizer through a message API, so a plugin can't break the host app.",ja:"プラグインのコードは iframe 内でサンドボックス実行され、メッセージ API で Visualizer とやり取りします。ホストを壊しません。"})+"</p><h2 id=\"o-types\">"+L({en:"Extension types",ja:"拡張タイプ"})+"</h2><ul><li><b>Widget</b> — "+L({en:"floating UI on the map.",ja:"地図上の浮遊 UI。"})+"</li><li><b>Infobox Block</b> — "+L({en:"content shown when a feature is selected.",ja:"フィーチャー選択時の内容。"})+"</li><li><b>Story Block</b> — "+L({en:"a step in a scrollytelling story.",ja:"スクロールテリングの1ステップ。"})+"</li></ul>"+overviewHub("vplugin");}};

  body:function(){return "<p>"+L({en:"Call the CMS Public API from your plugin, map items to GeoJSON, and hand them to <code>reearth.layers</code>.",ja:"プラグインから CMS Public API を呼び、アイテムを GeoJSON に変換して <code>reearth.layers</code> に渡します。"})+"</p><div class=\"codeblock\"><div><span class=\"k\">const</span> res = <span class=\"k\">await</span> fetch(cmsPublicApiUrl);</div><div>reearth.layers.add({ type:'geojson', data });</div></div>";},refs:["vplugin/reference","cms/c-delivery"]};

  return '<div class="seealso"><div class="lbl">'+L(T.tryNext)+'</div><p style="font-size:13px;color:var(--text-muted);margin:0 0 10px">'+L({en:"Now that you can do this, try building something else:",ja:"ここまでできたら、次はこれを作ってみましょう："})+'</p>'+links+'</div>';}
function refCmsBody(){return '<p>'+L({en:"Each field has a type that decides what it can hold. Before choosing one, it helps to decide your ",ja:"各フィールドには、何を入れられるかを決める型があります。型を選ぶ前に、まず"})+'<a href="#" data-route="cms/c-schema">'+L({en:"model structure",ja:"モデルの構造"})+'</a>'+L({en:". Separately from the type, each field can carry ",ja:"を決めておくと選びやすくなります。型とは別に、各フィールドには"})+'<a href="#" data-route="cms/r-attributes">'+L({en:"input rules",ja:"入力ルール"})+'</a>'+L({en:"; to add and edit the items that use them, see ",ja:"も設定できます。これらのフィールドを持つアイテムの追加・編集は"})+'<a href="#" data-route="cms/howto-manage">'+L({en:"managing content items",ja:"コンテンツアイテムの管理"})+'</a>'+L({en:".",ja:"を参照してください。"})+'</p>'+FIELDS.map(function(f,i){var id="f-"+f.n.toLowerCase().replace(/[^a-z]+/g,"-");return '<section class="refitem" id="'+id+'"><div class="hd"><span class="num">'+String(i+1).padStart(2,"0")+'</span><h3>'+esc(f.n)+'</h3><code>'+esc(f.t)+'</code></div><p style="margin:0 0 6px;color:var(--text-soft);font-size:14px">'+L(f.d)+'</p><div style="font-size:12.5px;color:var(--text-muted)"><b style="color:var(--text-soft)">'+L({en:"Use for",ja:"用途"})+':</b> '+L(f.u)+'</div></section>';}).join("");}
function refApiBody(){return '<p>'+L({en:"Each namespace below is self-contained — copy its anchor to cite it directly.",ja:"以下の各名前空間は自己完結です。アンカーで直接引用できます。"})+'</p>'+APIREF.map(function(a,i){var id="api-"+a.n.replace(/[^a-zA-Z]+/g,"-").toLowerCase();return '<section class="refitem" id="'+id+'"><div class="hd"><span class="num">'+String(i+1).padStart(2,"0")+'</span><h3 style="font-family:var(--font-mono);font-size:14px">'+esc(a.n)+'</h3></div><p style="margin:0;color:var(--text-soft);font-size:14px">'+L(a.d)+'</p></section>';}).join("");}
function crumbs(p){var parts=[{l:L(T.docs),r:"home"}];
  if(p.standalone){parts.push({l:L(T.tutorials),r:"tutorials"});}
  else{var cfg=sec(p.section);if(cfg&&cfg.kind==="dev"){parts.push({l:L(T.devTab),r:"developer"});parts.push({l:secName(p.section),r:tabRouteFor(p.section,"overview")});}else if(cfg){parts.push({l:secName(p.section).replace("Re:Earth ",""),r:tabRouteFor(p.section,"overview")});}if(p.type)parts.push({l:L(DIA[p.type].label),r:null});}
  parts.push({l:L(p.title),r:null});
  return '<nav class="crumbs" aria-label="Breadcrumb">'+parts.map(function(c,i){var sep=i<parts.length-1?'<span class="sep">/</span>':'';return (c.r?'<a href="#" data-route="'+c.r+'">'+esc(c.l)+'</a>':'<span>'+esc(c.l)+'</span>')+sep;}).join("")+'</nav>';}
function docmeta(p){var fb=S.fb[S.route];
  return '<div class="docmeta"><span>'+svg("clock")+' '+L(T.updated)+' '+L(p.updated||{en:"—",ja:"—"})+'</span></div>'
    +'<div class="fb"><div class="q">'+L(T.helpful)+'</div><div class="btns"><button data-fb="up" '+(fb==="up"?'aria-pressed="true"':'')+'>👍 '+L(T.yes)+'</button><button data-fb="down" '+(fb==="down"?'aria-pressed="true"':'')+'>👎 '+L(T.no)+'</button><button id="reportBtn" style="margin-left:auto">'+L(T.report)+'</button></div>'+(fb?'<div class="thanks">'+L(T.thanks)+'</div>':'')+'</div>';}
function home(){var prods=PRODUCT_LIST.map(function(id){var s=sec(id);var live=s.live;var route=live?tabRouteFor(id,"overview"):null;
    return (live?'<a class="prodcard" href="#" data-route="'+route+'">':'<div class="prodcard soon">')+'<div class="nm"><span class="sw" style="background:'+s.sw+'"></span>'+L(s.name)+(live?'':'<span class="soonbadge">'+L(T.comingSoon)+'</span>')+'</div><div class="pd">'+L(s.desc)+'</div>'+(live?'<span class="go">'+L(TABTITLE.overview)+' →</span></a>':'</div>');}).join("");
  return '<main class="home" id="main"><div class="hero"><h1>'+L({en:"How can we help?",ja:"お手伝いできることはありますか？"})+'</h1><p>'+L({en:"Documentation, guides and references for the Re:Earth platform.",ja:"Re:Earthプラットフォームのドキュメント・ガイド・リファレンス。"})+'</p></div>'
    +'<div class="sect"><div class="sect-h">'+L(T.products)+'</div><div class="sect-s">'+L(T.productsSub)+'</div><div class="prodgrid">'+prods+'</div></div>'
    +'<div class="sect"><div class="sect-h">'+L(T.dev)+'</div><div class="sect-s">'+L(T.devSub)+'</div><div class="tutbanner" style="border-color:var(--border);background:var(--bg-subtle)"><div style="flex:1"><div style="font-weight:600;font-size:14px;margin-bottom:2px">'+L({en:"3 developer sites",ja:"3つの開発者向けサイト"})+'</div><div style="font-size:12.5px;color:var(--text-soft)">Visualizer Plugin · CMS Developer · Flow Developer</div></div><button class="cta" data-route="developer">'+L(T.devTab)+' →</button></div></div>'
    +'<div class="sect"><div class="tutbanner"><div style="flex:1"><div style="font-weight:600;font-size:15px;margin-bottom:3px">'+L(T.tutorials)+'</div><div style="font-size:13px;color:var(--text-soft)">'+L(T.tutSub)+'</div></div><button class="cta" data-route="tutorials">'+L(T.browseTut)+' →</button></div></div>'
    +'<div class="sect"><div class="sect-h">'+L(T.community)+'</div><div class="sect-s">'+L(T.communitySub)+'</div><div class="commgrid">'+community()+'</div></div></main>';}
function community(){return COMMUNITY.map(function(c){return '<a class="commcard" href="'+c.url+'" target="_blank" rel="noopener"><span class="ci">'+svg("ext")+'</span><span class="cbody"><span class="cn">'+esc(c.nm)+'</span><span class="cr">'+L(c.role)+'</span></span><span class="carr">↗</span></a>';}).join("");}
function developerLanding(){var cards=DEV_LIST.map(function(id){var s=sec(id);var live=s.live;var route=live?tabRouteFor(id,"overview"):null;
    var struct='<div class="structure">'+(s.structure||[]).map(function(x){return '<span>'+esc(x)+'</span>';}).join("")+'</div>';
    return (live?'<a class="prodcard" href="#" data-route="'+route+'">':'<div class="prodcard soon">')+'<div class="nm">'+L(s.name)+(live?'':'<span class="soonbadge">'+L(T.comingSoon)+'</span>')+'</div><div class="pd">'+L(s.desc)+'</div>'+struct+(live?'<span class="go" style="display:block;margin-top:10px">'+L(TABTITLE.overview)+' →</span></a>':'</div>');}).join("");
  return '<main class="home" id="main"><div class="hero" style="margin-bottom:24px"><h1>'+L(T.dev)+'</h1><p>'+L(T.devSub)+'</p></div><div class="sect"><div class="prodgrid">'+cards+'</div></div><p style="max-width:760px;margin:6px auto 0;font-size:12.5px;color:var(--text-muted);text-align:center">'+L({en:"Contributor docs live in each GitHub repository, not here.",ja:"コントリビューター向けは各 GitHub リポジトリにあり、ここには置きません。"})+'</p></main>';}
function library(){var fp=S.tut.product,fa=S.tut.audience;
  var filtered=LIBRARY.filter(function(it){return (fp.length===0||fp.indexOf(it.product)>=0)&&(fa.length===0||fa.indexOf(it.audience)>=0);});
  var prodChips=["cms","visualizer","developer"].map(function(id){var on=fp.indexOf(id)>=0;var nm=id==="developer"?L(T.developer):secName(id).replace("Re:Earth ","");return '<button class="chip" data-fprod="'+id+'" '+(on?'aria-pressed="true"':'')+'>'+nm+'</button>';}).join("");
  var audChips=[["user",T.user],["developer",T.developer]].map(function(a){var on=fa.indexOf(a[0])>=0;return '<button class="chip" data-faud="'+a[0]+'" '+(on?'aria-pressed="true"':'')+'>'+L(a[1])+'</button>';}).join("");
  var cards=filtered.length?filtered.map(function(it){var pg=PAGES[it.route];var prodName=it.product==="developer"?L(T.developer):secName(it.product).replace("Re:Earth ","");
    return '<a class="tutcard" href="#" data-route="'+it.route+'"><div class="meta"><span class="badge" style="background:'+diaSoft("tutorial")+';color:'+diaColor("tutorial")+'">'+prodName+'</span><span class="badge" style="background:var(--bg-subtle);color:var(--text-soft)">'+(it.audience==="developer"?L(T.developer):L(T.user))+'</span>'+(pg.est?'<span class="badge" style="background:var(--bg-subtle);color:var(--text-muted)">⏱ '+L(pg.est)+'</span>':'')+'</div><div class="ct">'+L(pg.title)+'</div><div class="cd">'+L(pg.lead)+'</div></a>';}).join(""):'<div class="empty">'+L(T.noTut)+'</div>';
  return '<main class="lib" id="main"><h1>'+L(T.tutorials)+'</h1><p class="sub">'+L(T.tutSub)+'</p><div class="filters"><div class="fgroup"><div class="fh">'+L(T.filterProduct)+'</div><div class="chips">'+prodChips+'</div></div><div class="fgroup"><div class="fh">'+L(T.filterAudience)+'</div><div class="chips">'+audChips+'</div></div></div><div class="tutlist">'+cards+'</div></main>';}
function placeholder(){var nm=secName(S.product)||"Re:Earth";return '<div class="placeholder" id="main"><h1>'+esc(nm)+' '+L(T.docs)+'</h1><p>'+L({en:"This section is a placeholder in the prototype. CMS, Visualizer and the Visualizer Plugin site are built out — use the switcher.",ja:"このセクションはプロトタイプ上のプレースホルダーです。CMS・Visualizer・Visualizer Plugin は作り込み済みです。スイッチャーからご覧ください。"})+'</p></div>';}
function svg(k){var s='stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"';if(k==="search")return '<svg width="15" height="15" viewBox="0 0 24 24"><circle '+s+' cx="11" cy="11" r="7"/><path '+s+' d="M21 21l-4-4"/></svg>';if(k==="clock")return '<svg width="13" height="13" viewBox="0 0 24 24" style="vertical-align:-2px"><circle '+s+' cx="12" cy="12" r="9"/><path '+s+' d="M12 7v5l3 2"/></svg>';if(k==="ext")return '<svg width="16" height="16" viewBox="0 0 24 24"><path '+s+' d="M17 3a4 4 0 014 4v10a4 4 0 01-4 4H7a4 4 0 01-4-4V7a4 4 0 014-4z"/><path '+s+' d="M8.5 12.5h7M12 9v7"/></svg>';if(k==="ai")return '<svg width="13" height="13" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:5px"><path '+s+' d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/></svg>';if(k==="launch")return '<svg width="15" height="15" viewBox="0 0 24 24"><path '+s+' d="M14 4h6v6"/><path '+s+' d="M20 4L11 13"/><path '+s+' d="M18 14v3a3 3 0 01-3 3H7a3 3 0 01-3-3V9a3 3 0 013-3h3"/></svg>';return "";}
function iconFor(k){var s='stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"';var d={tutorial:'<path '+s+' d="M12 4l10 5-10 5L2 9z"/><path '+s+' d="M6 11v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/>',howto:'<path '+s+' d="M14.7 6.3a4 4 0 00-5.4 5.2L3 18v3h3l6.5-6.5a4 4 0 005.2-5.4l-2.6 2.6-2.1-.5-.5-2.1z"/>',reference:'<path '+s+' d="M4 5a2 2 0 012-2h13v16H6a2 2 0 00-2 2z"/>',concepts:'<path '+s+' d="M9 18h6M10 21h4M12 3a6 6 0 013.5 10.9c-.5.4-.5 1-.5 1.6H9c0-.6 0-1.2-.5-1.6A6 6 0 0112 3z"/>'}[k];return '<svg width="15" height="15" viewBox="0 0 24 24" style="margin-right:1px">'+d+'</svg>';}
function searchProd(p){var scn=sec(p.section);if(!p.section)return "";return (scn&&scn.kind==="dev")?"developer":p.section;}
function searchDocs(){return Object.keys(PAGES).map(function(k){var p=PAGES[k];var scn=sec(p.section);return {route:k,title:L(p.title),crumb:(scn?L(scn.name).replace("Re:Earth ",""):"")+" · "+(p.type?L(DIA[p.type].label):(p.tab?tabTitle(p.tab):"")),type:p.type||"",product:searchProd(p)};});}
function searchFacetOpts(all){var prod=[],typ=[];all.forEach(function(d){if(d.product&&prod.indexOf(d.product)<0)prod.push(d.product);if(d.type&&typ.indexOf(d.type)<0)typ.push(d.type);});
  var prodOrder=["cms","visualizer","flow","dashboard","developer"];var typOrder=["tutorial","concepts","howto","reference"];
  prod.sort(function(a,b){return prodOrder.indexOf(a)-prodOrder.indexOf(b);});typ.sort(function(a,b){return typOrder.indexOf(a)-typOrder.indexOf(b);});
  return {prod:prod,typ:typ};}
function prodFacetLabel(id){return id==="developer"?L(T.developer):secName(id).replace("Re:Earth ","");}
function renderSearch(){var inp=document.getElementById("searchInput");var q=(inp?inp.value:"").trim().toLowerCase();
  var all=searchDocs();var opts=searchFacetOpts(all);
  var res=all.filter(function(d){var mq=!q||(d.title+" "+d.crumb).toLowerCase().indexOf(q)>=0;var mp=S.sf.product.length===0||S.sf.product.indexOf(d.product)>=0;var mt=S.sf.type.length===0||S.sf.type.indexOf(d.type)>=0;return mq&&mp&&mt;});
  var fbox=document.getElementById("searchFacets");
  if(fbox){var pc=opts.prod.map(function(id){var on=S.sf.product.indexOf(id)>=0;return '<button class="schip" data-sfp="'+id+'" '+(on?'aria-pressed="true"':'')+'>'+esc(prodFacetLabel(id))+'</button>';}).join("");
    var tc=opts.typ.map(function(t){var on=S.sf.type.indexOf(t)>=0;return '<button class="schip" data-sft="'+t+'" '+(on?'aria-pressed="true"':'')+'>'+L(DIA[t].label)+'</button>';}).join("");
    fbox.innerHTML='<span class="fl">'+L(T.filterProduct)+'</span>'+pc+'<span class="sep"></span><span class="fl">'+L(T.filterType)+'</span>'+tc;
    fbox.querySelectorAll("[data-sfp]").forEach(function(b){b.onclick=function(){toggleFacet(S.sf.product,b.getAttribute("data-sfp"));renderSearch();};});
    fbox.querySelectorAll("[data-sft]").forEach(function(b){b.onclick=function(){toggleFacet(S.sf.type,b.getAttribute("data-sft"));renderSearch();};});}
  var box=document.getElementById("searchResults");if(!box)return;
  box.innerHTML=res.length?res.map(function(d,i){var tag=d.type?d.type.slice(0,3).toUpperCase():"OV";return '<a class="result'+(i===0?' act':'')+'" href="#" data-route="'+d.route+'"><span class="tag" style="color:'+(d.type?diaColor(d.type):'var(--text-soft)')+';background:'+(d.type?diaSoft(d.type):'var(--bg-subtle)')+'">'+tag+'</span><span><span class="rt">'+esc(d.title)+'</span><br><span class="rc">'+esc(d.crumb)+'</span></span></a>';}).join(""):'<div class="empty">'+L({en:"No matching pages.",ja:"一致するページがありません。"})+'</div>';
  var hint=document.getElementById("searchHint");if(hint)hint.textContent=L(T.searchMock)+" · "+res.length+" "+L(T.resultCount);if(inp)inp.placeholder=L(T.search);
  box.querySelectorAll("[data-route]").forEach(function(a){a.onclick=function(e){e.preventDefault();go(a.getAttribute("data-route"));};});}
function toggleFacet(arr,v){var i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);}
function openSearch(){var m=document.getElementById("searchModal");m.hidden=false;var i=document.getElementById("searchInput");i.value="";renderSearch();setTimeout(function(){i.focus();},20);}
function closeSearch(){var m=document.getElementById("searchModal");if(m)m.hidden=true;}
function wire(){
  document.querySelectorAll("[data-route]").forEach(function(a){if(a.closest("#searchResults"))return;a.addEventListener("click",function(e){e.preventDefault();var tf=a.getAttribute("data-tutfilter");if(tf){S.tut.product=[tf];S.tut.audience=[];}go(a.getAttribute("data-route"));});});
  document.querySelectorAll("[data-product-sw]").forEach(function(b){b.addEventListener("click",function(){var id=b.getAttribute("data-product-sw");S.product=id;var ov=tabRouteFor(id,"overview");if(ov){go(ov);}else{S.route="__ph";closeSearch();render();window.scrollTo(0,0);}});});
  document.querySelectorAll("[data-lang]").forEach(function(b){b.addEventListener("click",function(){S.lang=b.getAttribute("data-lang");render();});});
  var tt=document.getElementById("toggleTheme");if(tt)tt.addEventListener("click",function(){S.dark=!S.dark;render();});
  var os=document.getElementById("openSearch");if(os)os.addEventListener("click",openSearch);
  document.querySelectorAll("[data-fb]").forEach(function(b){b.addEventListener("click",function(){S.fb[S.route]=b.getAttribute("data-fb");render();});});
  var rb=document.getElementById("reportBtn");if(rb)rb.addEventListener("click",function(){alert(S.lang==="ja"?"問題報告はプロトタイプではモックです。":"Issue reporting is mocked in this prototype.");});
  document.querySelectorAll("[data-toc]").forEach(function(a){a.addEventListener("click",function(e){e.preventDefault();var t=document.getElementById(a.getAttribute("data-toc"));if(t)t.scrollIntoView({behavior:"smooth",block:"start"});});});
  document.querySelectorAll("[data-anchor]").forEach(function(a){a.addEventListener("click",function(e){e.preventDefault();var t=document.getElementById(a.getAttribute("data-anchor"));if(t)t.scrollIntoView({behavior:"smooth",block:"start"});});});
  document.querySelectorAll("[data-grp]").forEach(function(b){b.addEventListener("click",function(){var g=b.getAttribute("data-grp");S.collapsed[g]=!S.collapsed[g];render();});});
  document.querySelectorAll("[data-fprod]").forEach(function(b){b.addEventListener("click",function(){toggleFilter("product",b.getAttribute("data-fprod"));});});
  document.querySelectorAll("[data-faud]").forEach(function(b){b.addEventListener("click",function(){toggleFilter("audience",b.getAttribute("data-faud"));});});
}
function toggleFilter(kind,val){var arr=S.tut[kind];var i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);render();}
var hcTimer=null,hcEl=null;
function hcCard(){if(!hcEl){hcEl=document.createElement("div");hcEl.className="hovercard";hcEl.hidden=true;document.body.appendChild(hcEl);}return hcEl;}
function hideHovercard(){if(hcTimer){clearTimeout(hcTimer);hcTimer=null;}if(hcEl)hcEl.hidden=true;}
function showHovercard(a){var route=a.getAttribute("data-route");var p=PAGES[route];if(!p)return;
  var el=hcCard();
  var top=p.type?typePill(p.type):(p.tab?'<span class="hc-tab">'+tabTitle(p.tab)+'</span>':'');
  var lead=p.lead?'<div class="hc-lead">'+esc(L(p.lead))+'</div>':'';
  el.innerHTML='<div class="hc-top">'+top+'</div><div class="hc-title">'+esc(L(p.title))+'</div>'+lead;
  el.hidden=false;
  var r=a.getBoundingClientRect();var cw=el.offsetWidth,ch=el.offsetHeight;
  var left=Math.max(12,Math.min(r.left,window.innerWidth-cw-12));
  var tp=r.bottom+8;if(tp+ch>window.innerHeight-8)tp=Math.max(8,r.top-ch-8);
  el.style.left=left+"px";el.style.top=tp+"px";}
function bodyProseLink(t){var a=t&&t.closest?t.closest("a[data-route]"):null;if(!a)return null;if(!a.closest(".content-wrap"))return null;if(a.closest(".seealso")||a.closest(".pager")||a.closest(".crumbs"))return null;if(!a.closest("p")&&!a.closest("li"))return null;return PAGES[a.getAttribute("data-route")]?a:null;}
document.addEventListener("mouseover",function(e){var a=bodyProseLink(e.target);if(!a)return;if(hcTimer)clearTimeout(hcTimer);hcTimer=setTimeout(function(){showHovercard(a);},250);});
document.addEventListener("mouseout",function(e){if(bodyProseLink(e.target))hideHovercard();});
window.addEventListener("scroll",hideHovercard,true);
document.addEventListener("keydown",function(e){if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();var m=document.getElementById("searchModal");if(m.hidden)openSearch();else closeSearch();}if(e.key==="Escape")closeSearch();});
document.getElementById("searchModal").addEventListener("click",function(e){if(e.target.id==="searchModal")closeSearch();});
document.getElementById("searchInput").addEventListener("input",renderSearch);
render();
</script>
</body>
</html>
